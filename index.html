<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Classify</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#0f172a;
color:white;
}

/* HEADER */

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:16px 8%;
background:#020617;
border-bottom:1px solid #1e293b;
}

/* LOGO */

.logo{
font-size:24px;
font-weight:600;
background:linear-gradient(90deg,#6366f1,#8b5cf6);
-webkit-background-clip:text;
color:transparent;
}

/* NAVBAR */

nav{
display:flex;
align-items:center;
gap:25px;
}

nav a{
text-decoration:none;
color:#cbd5f5;
font-size:14px;
}

nav a:hover{
color:white;
}

/* SHARE BUTTON */

.share-btn{
background:linear-gradient(90deg,#6366f1,#8b5cf6);
border:none;
padding:7px 14px;
border-radius:6px;
color:white;
cursor:pointer;
font-size:13px;
}

.share-btn:hover{
opacity:0.9;
}

/* MENU BUTTON */

.menu-btn{
display:none;
font-size:22px;
cursor:pointer;
}

/* HERO */

.hero{
text-align:center;
padding:100px 20px;
max-width:800px;
margin:auto;
}

.hero h1{
font-size:38px;
margin-bottom:15px;
background:linear-gradient(90deg,#6366f1,#8b5cf6);
-webkit-background-clip:text;
color:transparent;
}

.hero p{
color:#94a3b8;
margin-bottom:35px;
font-size:16px;
}

/* SEARCH BOX */

.search-box{
background:#020617;
padding:22px;
border-radius:8px;
border:1px solid #1e293b;
display:flex;
gap:10px;
justify-content:center;
flex-wrap:wrap;
max-width:600px;
margin:auto;
}

select,input{
padding:10px;
border-radius:6px;
border:1px solid #334155;
background:#0f172a;
color:white;
min-width:140px;
}

/* SEARCH BUTTON */

.search-btn{
padding:10px 18px;
border:none;
border-radius:6px;
background:linear-gradient(90deg,#6366f1,#8b5cf6);
color:white;
cursor:pointer;
}

.search-btn:hover{
opacity:0.9;
}

/* CTA */

.cta{
text-align:center;
padding:70px 20px;
background:#020617;
border-top:1px solid #1e293b;
border-bottom:1px solid #1e293b;
}

.cta h2{
margin-bottom:8px;
font-size:24px;
}

.cta p{
color:#94a3b8;
margin-bottom:18px;
}

/* REGISTER BUTTON */

.register-btn{
background:#10b981;
padding:10px 18px;
border:none;
border-radius:6px;
color:white;
cursor:pointer;
}

.register-btn:hover{
background:#059669;
}

/* FOOTER */

footer{
text-align:center;
padding:30px;
color:#94a3b8;
font-size:14px;
}

/* MOBILE */

@media(max-width:768px){

header{
flex-wrap:wrap;
}

.menu-btn{
display:block;
}

nav{
width:100%;
flex-direction:column;
align-items:flex-start;
display:none;
margin-top:12px;
gap:12px;
}

nav.show{
display:flex;
}

.share-btn{
width:100%;
}

.hero h1{
font-size:28px;
}

.search-box{
flex-direction:column;
}

.search-box select,
.search-box input,
.search-box button{
width:100%;
}

}
  
</style>

</head>

<body>

<header>

<div class="logo">Classify</div>

<div class="menu-btn" onclick="toggleMenu()">☰</div>

<nav id="navMenu">

<a href="#">Home</a>
<a href="#">For Institutes</a>
<a href="#">Contact</a>

<button onclick="shareWebsite()"
  clas="share-nav">
</button>
</nav>

</header>



<section class="hero">

<h1>Find the Right Coaching Institute</h1>

<p>
Search and discover coaching institutes for competative exams.
</p>

<div class="search-box">

<select id="exam">
<option value="JEE">JEE</option>
<option value="NEET">NEET</option>
<option value="NDA">NDA</option>
<option value="CUET">CUET</option>
</select>

<input type="text" id="city" placeholder="Enter your city">

<button class="search-btn" onclick="search()">Search</button>

<script>

function search(){

const exam = document.getElementById("exam").value;
const city = document.getElementById("city").value;

console.log("Exam:", exam);
console.log("City:", city);

window.location.href = `search.html?exam=${exam}&city=${city}`

}

</script

</button>


</div>

</section>



<section class="cta">

<h2>Own a Coaching Institute?</h2>

<p>List your institute on Classify and reach students searching for coaching.</p>

<button class="register-btn">Register Institute</button>

</section>



<footer>

<p>© 2026 Classify</p>

</footer>



<script>

  <script>

function goToResults(){

const exam = document.querySelector("select").value;
const city = document.querySelector("input").value;

window.location.href = `pages/search.html?exam=${exam}&city=${city}`
}

function toggleMenu(){
document.getElementById("navMenu").classList.toggle("show");
}

function shareSite(){

if(navigator.share){

navigator.share({
title:"Classify",
text:"Find coaching institutes easily",
url:window.location.href
});

}else{

navigator.clipboard.writeText(window.location.href);
alert("Link copied");

}

}
  
</script>

 
</body>
</html>
</body>

</html>
