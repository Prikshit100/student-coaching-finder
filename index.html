<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Classify</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#0f172a;
color:white;
}

/* HEADER */

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 8%;
background:#020617;
border-bottom:1px solid #1e293b;
flex-wrap:wrap;
}

/* LOGO */

.logo{
font-size:22px;
font-weight:600;
color:#6366f1;
}

/* NAVBAR */

nav{
display:flex;
gap:25px;
align-items:center;
}

nav a{
text-decoration:none;
color:#cbd5f5;
font-size:14px;
}

nav a:hover{
color:white;
}

/* SHARE BUTTON */

.share-btn{
background:#6366f1;
border:none;
padding:8px 16px;
border-radius:6px;
color:white;
cursor:pointer;
font-size:13px;
}

.share-btn:hover{
background:#4f46e5;
}

/* MOBILE MENU BUTTON */

.menu-btn{
display:none;
font-size:24px;
cursor:pointer;
}

/* HERO */

.hero{
text-align:center;
padding:100px 20px;
max-width:850px;
margin:auto;
}

.hero h1{
font-size:40px;
margin-bottom:18px;
}

.hero p{
color:#94a3b8;
margin-bottom:35px;
}

/* SEARCH BOX */

.search-box{
background:#020617;
padding:25px;
border-radius:10px;
border:1px solid #1e293b;
display:flex;
gap:10px;
justify-content:center;
flex-wrap:wrap;
max-width:600px;
margin:auto;
}

select,input{
padding:12px;
border-radius:6px;
border:1px solid #334155;
background:#0f172a;
color:white;
min-width:150px;
}

/* SEARCH BUTTON */

.search-btn{
padding:12px 20px;
border:none;
border-radius:6px;
background:#6366f1;
color:white;
cursor:pointer;
}

.search-btn:hover{
background:#4f46e5;
}

/* CTA */

.cta{
text-align:center;
padding:80px 20px;
background:#020617;
border-top:1px solid #1e293b;
border-bottom:1px solid #1e293b;
}

.cta h2{
margin-bottom:10px;
}

.cta p{
color:#94a3b8;
margin-bottom:20px;
}

/* REGISTER BUTTON */

.register-btn{
background:#10b981;
padding:12px 20px;
border:none;
border-radius:6px;
color:white;
cursor:pointer;
}

.register-btn:hover{
background:#059669;
}

/* FOOTER */

footer{
text-align:center;
padding:35px;
color:#94a3b8;
}

/* MOBILE */

@media (max-width:768px){

.menu-btn{
display:block;
}

nav{
flex-direction:column;
width:100%;
display:none;
margin-top:15px;
}

nav.show{
display:flex;
}

.share-btn{
width:100%;
margin-top:10px;
}

.hero h1{
font-size:30px;
}

.search-box{
flex-direction:column;
}

.search-box select,
.search-box input,
.search-box button{
width:100%;
}

}

</style>

</head>

<body>

<header>

<div class="logo">Classify</div>

<div class="menu-btn" onclick="toggleMenu()">☰</div>

<nav id="navMenu">

<a href="#">Home</a>
<a href="#">Institutes</a>
<a href="#">For Institutes</a>
<a href="#">Contact</a>

<button onclick="shareSite()" class="share-btn">Share</button>

</nav>

</header>



<section class="hero">

<h1>Find the Right Coaching Institute</h1>

<p>
Search and discover coaching institutes for exams like JEE and NEET.
</p>

<div class="search-box">

<select>
<option>Select Exam</option>
<option>JEE</option>
<option>NEET</option>
<option>CUET</option>
</select>

<input type="text" placeholder="Enter your city">

<button class="search-btn">Search</button>

</div>

</section>



<section class="cta">

<h2>Own a Coaching Institute?</h2>

<p>List your institute on Classify and reach students searching for coaching.</p>

<button class="register-btn">Register Institute</button>

</section>



<footer>

<p>© 2026 Classify</p>

</footer>



<script>

function toggleMenu(){
document.getElementById("navMenu").classList.toggle("show");
}

function shareSite(){

if(navigator.share){

navigator.share({
title:"Classify",
text:"Find coaching institutes easily",
url:window.location.href
});

}else{

navigator.clipboard.writeText(window.location.href);
alert("Link copied");

}

}

</script>

</body>

</html>
