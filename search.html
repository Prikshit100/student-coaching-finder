<!DOCTYPE html>
<html>
<head>
  <title>Search Results</title>

  <style>

body{
  background:#0f0f0f;
  color:white;
  font-family:Arial;
  margin:0;
  padding:20px;
}

h1{
  text-align:center;
}

#results{
  display:flex;
  flex-direction:column;
  gap:20px;
}

.card{
  background:#111;
  padding:20px;
  border-radius:12px;
  border:1px solid #2a2a2a;
  transition:0.3s;
}

.card:hover{
  transform:scale(1.02);
}

button{
  margin-top:10px;
  padding:8px 16px;
  border:none;
  border-radius:6px;
  background:linear-gradient(90deg,#6a5cff,#4ecbff);
  color:white;
  cursor:pointer;
}

</style>
</head>

<body>

<h1>Institutes</h1>

<div id="results"></div>

<script src="js/search.js"></script>

</body>
</html>
